<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Talk to Ahmer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#111;--paper:#fff;--rust:#b33a18;--faded:#aaa;--line:#e8e8e8}
html,body{height:100%}
body{background:var(--paper);color:var(--ink);font-family:"Cormorant Garamond",Georgia,serif;display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%}
header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid var(--line)}
.header-left h1{font-family:"Playfair Display",serif;font-size:17px;font-weight:700;letter-spacing:-0.01em}
.header-left h1 em{font-style:italic;color:var(--rust)}
.header-sub{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--faded);margin-top:2px}
.header-right{font-family:"DM Mono",monospace;font-size:9px;color:var(--faded);text-align:right}
.status-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#4a9;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.chat-container{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.chat-container::-webkit-scrollbar{width:0}
.message{display:flex;gap:8px;max-width:100%;animation:fadeUp 0.3s ease forwards}
.message.user{justify-content:flex-end}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:"DM Mono",monospace;font-size:8px}
.avatar.ahmer{background:var(--ink);color:#fff}
.avatar.user-av{background:var(--rust);color:#fff}
.bubble{padding:10px 14px;line-height:1.7;font-size:16px;font-weight:300;max-width:80vw;border-radius:12px}
.message.ahmer .bubble{background:#f5f5f5;border-top-left-radius:2px}
.message.user .bubble{background:var(--ink);color:#fff;border-top-right-radius:2px;font-size:15px}
.bubble p+p{margin-top:0.6em}
.bubble strong{font-weight:600}
.source-badge{display:inline-block;font-family:"DM Mono",monospace;font-size:8px;letter-spacing:0.05em;text-transform:uppercase;padding:1px 5px;border-radius:8px;margin-top:5px}
.source-badge.static{background:#f0f7f0;color:#3a7a3a}
.source-badge.ai{background:#fdf0ed;color:var(--rust)}
.typing{display:flex;gap:8px;align-items:center}
.typing-bubble{background:#f5f5f5;padding:10px 14px;border-radius:12px;border-top-left-radius:2px;display:flex;gap:4px;align-items:center}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--faded);animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.suggestions{display:flex;gap:6px;padding:8px 20px;flex-shrink:0;border-top:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
.suggestions::-webkit-scrollbar{display:none}
.suggestion{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:0.05em;text-transform:uppercase;border:1px solid var(--line);padding:5px 10px;cursor:pointer;color:var(--faded);background:#fff;transition:all 0.15s;border-radius:20px;white-space:nowrap;flex-shrink:0}
.suggestion:hover,.suggestion:active{border-color:var(--ink);color:var(--ink)}
.input-area{padding:12px 20px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:#fff;border-top:1px solid var(--line)}
textarea{flex:1;border:1.5px solid #ccc;background:#f9f9f9;padding:10px 14px;font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:300;color:var(--ink);resize:none;outline:none;border-radius:20px;min-height:42px;max-height:96px;line-height:1.4;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none}
textarea:focus{border-color:var(--ink);background:#fff}
textarea::placeholder{color:#aaa;font-style:italic}
.send-btn{background:var(--ink);color:#fff;border:none;width:42px;height:42px;cursor:pointer;border-radius:50%;transition:background 0.15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0}
.send-btn:hover{background:var(--rust)}
.send-btn:disabled{background:var(--line);cursor:not-allowed}
.welcome{text-align:center;padding:40px 24px;max-width:400px;margin:auto}
.welcome h2{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;margin-bottom:10px;letter-spacing:-0.01em}
.welcome h2 em{font-style:italic;color:var(--rust)}
.welcome p{font-size:15px;font-weight:300;color:var(--faded);line-height:1.6;margin-bottom:6px}
.welcome-quote{font-style:italic;color:var(--ink);font-size:14px;border-left:2px solid var(--rust);padding-left:12px;margin:20px auto;text-align:left;line-height:1.6}
@media(max-width:768px){
  header{padding:12px 16px}
  .header-right{display:none}
  .chat-container{padding:12px 14px}
  .bubble{font-size:15px;max-width:85vw}
  .input-area{padding:10px 14px}
  textarea{font-size:16px}
  .welcome{padding:32px 16px}
  .welcome h2{font-size:20px}
}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>Ahmer <em>Siddiqui</em></h1>
    <div class="header-sub">Activist · Entrepreneur · Polymath</div>
  </div>
  <div class="header-right">
    <span class="status-dot"></span>AI Proxy
  </div>
</header>
<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcome">
    <h2>Ask <em>Ahmer</em></h2>
    <p>Filmmaker. Activist. Entrepreneur. Polymath.</p>
    <p>This AI speaks on his behalf.</p>
    <div class="welcome-quote">
      "Hum dekhenge — lazim hai ke hum bhi dekhenge."<br>
      <span style="font-size:12px;color:var(--faded);font-style:normal;">We shall witness. — Faiz</span>
    </div>
  </div>
</div>
<div class="suggestions" id="suggestions">
  <button class="suggestion" onclick="askSuggestion(this)">Who is Ahmer?</button>
  <button class="suggestion" onclick="askSuggestion(this)">What drives him?</button>
  <button class="suggestion" onclick="askSuggestion(this)">His most impactful work</button>
  <button class="suggestion" onclick="askSuggestion(this)">What does he believe?</button>
  <button class="suggestion" onclick="askSuggestion(this)">His view on India</button>
  <button class="suggestion" onclick="askSuggestion(this)">Advice for young people</button>
  <button class="suggestion" onclick="askSuggestion(this)">Road Ashram</button>
  <button class="suggestion" onclick="askSuggestion(this)">Vibes Network</button>
</div>
<div class="input-area">
  <textarea id="userInput" placeholder="Ask anything…" rows="1"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send">&#10148;</button>
</div>
<script>
const WORKER_URL = 'https://ahmer-proxy.ahmer-siddiqui.workers.dev';
let conversationHistory = [];
let isLoading = false;
let aiCallLog = [];
const MAX_AI = 20, WINDOW = 3600000;

function canCall() {
  const now = Date.now();
  aiCallLog = aiCallLog.filter(t => now - t < WINDOW);
  return aiCallLog.length < MAX_AI;
}

function fmt(text) {
  return text.split('\n\n').map(p =>
    '<p>' + p.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>') + '</p>'
  ).join('');
}

function addMsg(role, content, source) {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const c = document.getElementById('chatContainer');
  const d = document.createElement('div');
  d.className = 'message ' + (role === 'user' ? 'user' : 'ahmer');
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'user-av' : 'ahmer');
  av.textContent = role === 'user' ? 'You' : 'AS';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = fmt(content);
  if (source) {
    const badge = document.createElement('div');
    badge.className = 'source-badge ' + source;
    badge.textContent = source === 'static' ? '⚡ Instant' : '🤖 AI';
    b.appendChild(badge);
  }
  if (role === 'user') {
    d.appendChild(av);
    d.appendChild(b);
  } else {
    d.appendChild(av);
    d.appendChild(b);
  }
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('chatContainer');
  const t = document.createElement('div');
  t.className = 'typing'; t.id = 'typingIndicator';
  t.innerHTML = '<div class="avatar ahmer">AS</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  c.appendChild(t); c.scrollTop = c.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addMsg('user', text);
  conversationHistory.push({ role: 'user', content: text });

  if (!canCall()) {
    addMsg('assistant', 'I have reached my response limit for now. Please try again in a little while.', 'static');
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    return;
  }

  showTyping();
  aiCallLog.push(Date.now());

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory.slice(-6) })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "I am having trouble responding. Please try again.";
    const source = data.type === 'faq' ? 'static' : 'ai';
    removeTyping();
    addMsg('assistant', reply, source);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    removeTyping();
    addMsg('assistant', 'Connection issue. Please try again.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function askSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  sendMessage();
}

document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 96) + 'px';
});

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
